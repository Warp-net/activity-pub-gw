name: Build & Deploy Testnet

on:
  # push:
  #   branches:
  #     - develop
  workflow_dispatch:

jobs:
  build-gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: ghcr.io/warp-net/warpnet-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy:
    runs-on: ubuntu-latest
    needs: [ build-gateway ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          # Best-effort: a keyscan hiccup must not gate the deploy (the scp/ssh
          # below verify the host on connect). Without this, a single timeout
          # exits non-zero and bash -e fails the whole job.
          ssh-keyscan -H -T 15 207.154.221.44 >> ~/.ssh/known_hosts || true

      - name: Deploy to Testnet DO Droplet
        run: |
          scp -o StrictHostKeyChecking=accept-new ./deploy/deploy.sh root@207.154.221.44:/root
          scp -o StrictHostKeyChecking=accept-new ./deploy/docker-compose-testnet.yml root@207.154.221.44:/root/docker-compose-testnet.yml
          ssh -o StrictHostKeyChecking=accept-new root@207.154.221.44 'GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} TS_AUTHKEY=${{ secrets.TS_AUTHKEY }} bash /root/deploy.sh'
