services:
  fediverse-gateway:
    container_name: fediverse-gateway-testnet
    image: ghcr.io/warp-net/warpnet-gateway:latest
    network_mode: host
    restart: always
    environment:
      # Join the Warpnet TESTNET — bootstrap peers are baked into the gateway.
      - NODE_NETWORK=testnet
      # Public HTTPS via embedded Tailscale Funnel (no domain, no cert mgmt).
      # Provide TS_AUTHKEY as a CI secret; the *.ts.net hostname derives from
      # GATEWAY_FUNNEL_HOSTNAME and stays stable thanks to the /data volume.
      # To front the gateway yourself instead, drop TS_AUTHKEY and set
      # GATEWAY_HOST (the public hostname) — it then serves plain HTTP locally.
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - GATEWAY_FUNNEL_HOSTNAME=warpnet-gw-testnet
    volumes:
      # Persists the RSA signing key, follower fallback and Tailscale identity.
      - /root/.warpnet-gateway:/data:rw
